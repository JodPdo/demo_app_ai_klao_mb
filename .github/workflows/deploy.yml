name: Deploy aiklao_be

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy BE to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST is empty"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "VPS_USER is empty"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_PORT }}" ]; then
            echo "VPS_PORT is empty"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "VPS_SSH_KEY is empty"
            exit 1
          fi

          echo "All SSH secrets exist"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            /var/www/aiklao_be/deploy.sh
