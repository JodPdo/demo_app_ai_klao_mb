version: '3'

# AiKlao Release Workflow
# Prerequisites:
#   - Install Task     (https://taskfile.dev/installation/)
#   - Install jq       (brew install jq | scoop install jq)
#   - Install git-cliff (cargo install git-cliff | scoop install git-cliff)
#
# Steps to release:
#   1. ทำงานบน develop branch + commit changes
#   2. $ task patch-release   (bug fixes — x.y.Z)
#      $ task minor-release   (new features — x.Y.0)
#      $ task major-release   (breaking changes — X.0.0)
#   3. $ task push-release

tasks:

  # ─── Guards ──────────────────────────────────────────────────────────────────

  is-branch-clean:
    desc: Verify we are on develop with a clean working directory
    cmds:
      - |
        git branch --show-current | grep -qE '^develop$' || \
        (echo "❌ Not on develop branch. Please checkout to develop first."; exit 1)

      - |
        git diff --quiet || \
        (echo "❌ Working directory is not clean. Please commit or stash changes."; exit 1)

      # Explicit pull target (Windows/MINGW safe)
      - |
        git fetch origin develop && \
        git merge --ff-only origin/develop || \
        (echo "❌ Cannot fast-forward — diverged branches. Reconcile first."; exit 1)

  is-tests-passed:
    desc: Run unit tests — must pass before releasing
    cmds:
      - |
        npm test || \
        (echo "❌ Unit tests failed. Please fix and commit changes."; exit 1)
    deps:
      - is-branch-clean

  is-last-commit-release:
    desc: Verify the last commit is a release commit (e.g. "0.1.1")
    cmds:
      - git --no-pager log -1 --pretty=%B

      - |
        git --no-pager log -1 --pretty=%B | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+' || \
        (echo "❌ Last commit is not a release commit. Please run task patch-release or task minor-release first."; exit 1)

    deps:
      - is-branch-clean

  is-new-changes-since-release:
    desc: Verify there are commits to release (avoid noop release)
    cmds:
      - cmd: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "ℹ️  No previous tags — first release"
          else
            COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)

            if [ "$COUNT" = "0" ]; then
              echo "❌ No new commits since $LAST_TAG — nothing to release"
              exit 1
            fi

            echo "ℹ️  $COUNT commit(s) since $LAST_TAG"
          fi
    deps:
      - is-branch-clean

  # ─── Version bump ────────────────────────────────────────────────────────────

  _release:
    internal: true
    requires:
      vars: [BUMP]

    cmds:
      - cmd: |
          echo "📦 Creating {{.BUMP}} release..."

          npm version {{.BUMP}} --no-git-tag-version

          VERSION=$(jq -r .version package.json | tr -d '\r')

          echo "📦 New version: $VERSION"

          git cliff --tag="v$VERSION" > CHANGELOG.md

          git add package.json package-lock.json CHANGELOG.md

          git commit -m "$VERSION"

          git tag "v$VERSION"

          echo ""
          echo "✅ Released v$VERSION"
          echo "▶ Run 'task push-release' to push commits + tag"

  patch-release:
    desc: Bump patch version (x.y.Z) — bug fixes
    cmds:
      - task: _release
        vars:
          BUMP: patch
    deps:
      - is-tests-passed
      - is-new-changes-since-release

  minor-release:
    desc: Bump minor version (x.Y.0) — new features
    cmds:
      - task: _release
        vars:
          BUMP: minor
    deps:
      - is-tests-passed
      - is-new-changes-since-release

  major-release:
    desc: Bump major version (X.0.0) — breaking changes
    cmds:
      - task: _release
        vars:
          BUMP: major
    deps:
      - is-tests-passed
      - is-new-changes-since-release

  # ─── Merge & push ────────────────────────────────────────────────────────────

  merge-release:
    desc: Merge develop into main
    prompt: Merge branch develop into main — do you want to continue?

    cmds:
      - cmd: |
          VERSION=$(jq -r .version package.json | tr -d '\r')

          echo "📦 Merging release v$VERSION → main"

          git checkout main
          git pull origin main --ff-only

          git merge develop --no-ff -m "release v$VERSION"

          git checkout develop

    deps:
      - is-last-commit-release

  push-release:
    desc: Push develop, main, and all tags to remote
    prompt: Push develop + main branches and tags to origin — do you want to continue?

    cmds:
      - cmd: |
          git checkout develop
          git push origin develop

          git checkout main
          git push origin main

          git push --tags

          VERSION=$(jq -r .version package.json | tr -d '\r')

          echo ""
          echo "🚀 Release v$VERSION pushed!"
          echo "▶ Watch deploy: https://github.com/torpeerapolthi/demo_app_ai_klao_be/actions"

    deps:
      - merge-release

  # ─── Utilities ───────────────────────────────────────────────────────────────

  version:
    desc: Show current version
    silent: true

    cmds:
      - jq -r .version package.json | tr -d '\r'

  changelog-preview:
    desc: Preview unreleased CHANGELOG entries (without writing)
    silent: true

    cmds:
      - git cliff --unreleased

  status:
    desc: Show release status (version, last tag, commits since)
    silent: true

    cmds:
      - cmd: |
          VERSION=$(jq -r .version package.json | tr -d '\r')
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          BRANCH=$(git branch --show-current)
          UPSTREAM=$(git rev-parse --abbrev-ref --symbolic-full-name @{u} 2>/dev/null || echo "none")

          echo "Branch:        $BRANCH"
          echo "Upstream:      $UPSTREAM"
          echo "Version:       $VERSION"
          echo "Last tag:      $LAST_TAG"

          if [ "$LAST_TAG" != "none" ]; then
            COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)

            echo "Commits since: $COUNT"

            if [ "$COUNT" != "0" ]; then
              echo ""
              echo "Recent commits:"

              git log "${LAST_TAG}..HEAD" --oneline --no-decorate | head -10
            fi
          fi